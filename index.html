<!DOCTYPE html>
<html>
<head>
    <title>Iudicium – Symptom Triage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f9f9f9;
        }

        h1 {
            color: #2c3e50;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

            button:hover {
                background: #0056b3;
            }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #007bff;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .disclaimer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
            b   order-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <h1>⚖️ Iudicium</h1>
    <p>Describe your symptoms in plain English.</p>
    <textarea id="symptoms" placeholder="e.g., I have a headache, fever, and my throat hurts..."></textarea>
    <br><br>
    <button onclick="submitSymptoms()">Get Triage</button>
    <div id="result"></div>
    <div class="disclaimer">⚠️ This is not a medical diagnosis. Always consult a doctor.</div>

    <script>
        async function submitSymptoms() {
            const symptoms = document.getElementById('symptoms').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔄 Loading...';

            try {
                const response = await fetch('/triage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: symptoms })
                });
                const data = await response.json();
                resultDiv.innerHTML = data.triage;
            } catch (error) {
                resultDiv.innerHTML = '❌ Something went wrong. Please try again.';
            }
        }
    </script>
</body>
</html>
